<script>
const RENAME = {
  "英语听说4级":"听说","英语听说3级":"听说","英语听说2级":"听说","英语听说1级":"听说","英语听说":"听说","ESL 听说":"听说",
  "英语读写4级":"读写","英语读写3级":"读写","英语读写2级":"读写","英语读写1级":"读写","英语读写":"读写","ESL 读写":"读写",
  "法语":"小语种","西班牙语":"小语种","日语":"小语种",
};
const EXCLUDE = new Set(["选修","STEAM课程"]);

// ===== GPA Calculation (mirrors transcript generator rules) =====
const GPA_COURSE_MAP = {
  "英语听说":"_ENG","英语读写":"_ENG","写作":"_ENG",
  "英语听说4级":"_ENG","英语读写4级":"_ENG",
  "英语听说3级":"_ENG","英语读写3级":"_ENG",
  "英语听说2级":"_ENG","英语读写2级":"_ENG",
  "英语听说1级":"_ENG","英语读写1级":"_ENG",
  "ESL 听说":"_ENG","ESL 读写":"_ENG","文学":"_ENG",
  "托福课程":"_ENG","文书写作":"_ENG","英美文学":"_ENG",
  "语文一册":"_CHN","语文二册":"_CHN",
  "数学":"Algebra II","物理":"Physics","化学":"Chemistry",
  "生物一册":"Biology","生物二册":"Biology 9","计算机":"Computer Science",
  "中国历史":"Chinese History","法语":"French","西班牙语":"Spanish","日语":"Japanese",
  "美术":"Art","音乐":"Music","体育":"Physical Education","戏剧":"Drama",
  "AP预备微积分":"AP Pre-calculus","AP微积分":"AP Calculus","AP统计":"AP Statistics",
  "AP物理1":"AP Physics 1","AP物理2":"AP Physics 2","AP物理C":"AP Physics C",
  "AP化学":"AP Chemistry","AP生物":"AP Biology",
  "美国历史":"American History","世界历史":"World History",
  "经济学":"Economics","AP计算机科学":"AP Computer Science",
  "AP微观经济":"AP Microeconomics","AP宏观经济":"AP Macroeconomics","AP宏观经济学":"AP Macroeconomics",
  "AP心理学":"AP Psychology","AP研讨会":"AP Seminar",
  "知识论TOK":"Theory of Knowledge",
  "AP 美术":"AP Art","AP美术":"AP Art","Capstone":"Capstone",
};
const GPA_REG = [
  [97,100,4.33,0.5],[93,96,4,0.5],[90,92,3.67,0.5],
  [87,89,3.33,0.5],[83,86,3,0.5],[80,82,2.67,0.5],
  [77,79,2.33,0.5],[73,76,2,0.5],[70,72,1.67,0.5],
  [67,69,1.33,0],[63,66,1,0],[60,62,0.67,0],[0,59,0,0]
];
const GPA_AP = [
  [97,100,5,0.5],[93,96,4.67,0.5],[90,92,4.33,0.5],
  [87,89,4,0.5],[83,86,3.67,0.5],[80,82,3.33,0.5],
  [77,79,3,0.5],[73,76,2.67,0.5],[70,72,2.33,0.5],
  [67,69,2,0],[63,66,1.67,0],[60,62,1.33,0],[0,59,0,0]
];
function gpaLookup(score, isAP) {
  const r = Math.round(score), t = isAP ? GPA_AP : GPA_REG;
  for (const [lo,hi,gpa,cr] of t) if (r>=lo&&r<=hi) return {gpa,cr};
  return {gpa:0,cr:0};
}
function calcStudentGPA(student) {
  const engScores = [], chnScores = [], standalone = [];
  for (const key of Object.keys(student.courses)) {
    const c = student.courses[key];
    if (c.semScore === null || c.semScore === undefined || isNaN(c.semScore)) continue;
    const cn = c.courseCN;
    if (EXCLUDE.has(cn)) continue;
    const en = GPA_COURSE_MAP[cn];
    if (!en) { standalone.push({engName:cn, score:c.semScore}); continue; }
    if (en === "_ENG") engScores.push(c.semScore);
    else if (en === "_CHN") chnScores.push(c.semScore);
    else standalone.push({engName:en, score:c.semScore});
  }
  const final = [];
  if (engScores.length > 0) {
    const avg = engScores.reduce((a,b)=>a+b,0)/engScores.length;
    // Determine grade level for English name
    final.push({engName:"English", score:Math.round(avg*10)/10});
  }
  if (chnScores.length > 0) {
    const avg = chnScores.reduce((a,b)=>a+b,0)/chnScores.length;
    final.push({engName:"Chinese", score:Math.round(avg*10)/10});
  }
  for (const c of standalone) final.push(c);
  let tCr = 0, tW = 0;
  for (const c of final) {
    const isAP = c.engName.startsWith("AP ");
    const {gpa,cr} = gpaLookup(c.score, isAP);
    tCr += cr; tW += gpa * cr;
  }
  return tCr > 0 ? Math.round(tW / tCr * 100) / 100 : null;
}

  "美国历史","世界历史","中国历史","AP心理学","AP研讨会","知识论TOK",

function parseFile(data) {
  const wb = XLSX.read(data, {type:"array"});
  const SKIP_C0 = new Set(["学号","学期","班级","任课老师","课程","课程满分","学分"]);
  const students = [];

  for (const sheetName of wb.SheetNames) {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {header:1, defval:""});

    // Extract class info for title
    let className = "", semester = "";
    for (const row of rows) {
      if (String(row[0]).trim() === "学期" && row[1]) semester = String(row[1]);
      if (String(row[0]).trim() === "班级" && !className) {
        for (let ci = 1; ci < row.length; ci++) {
          const cell = String(row[ci] || "");
          if (cell.match(/\d{1,2}年级\d+班/)) { className = cell; break; }
        }
      }
    }

    // Build course -> class name mapping from 班级 and 课程 rows
    const courseToClass = {};
    let classRow = null, courseRow = null;
    let teacherRow = null;
    for (let i = 0; i < Math.min(rows.length, 10); i++) {
      const c0 = String(rows[i][0] || "").trim();
      if (c0 === "班级") classRow = i;
      if (c0 === "课程") courseRow = i;
      if (c0 === "任课老师") teacherRow = i;
    }
    if (classRow !== null && courseRow !== null) {
      for (let ci = 1; ci < rows[courseRow].length; ci++) {
        const crs = String(rows[courseRow][ci] || "").trim();
        const cls = String(rows[classRow][ci] || "").trim();
        if (crs && cls) courseToClass[crs] = cls;
      }
    }
    const courseToTeacher = {};
    if (teacherRow !== null && courseRow !== null) {
      for (let ci = 1; ci < rows[courseRow].length; ci++) {
        const crs = String(rows[courseRow][ci] || "").trim();
        const tch = String(rows[teacherRow][ci] || "").trim();
        if (crs && tch) courseToTeacher[crs] = tch;
      }
    }

    // Find all subject blocks (header rows with 学号 in col 0)
    const blocks = [];
    for (let i = 0; i < rows.length; i++) {
      if (String(rows[i][0]).trim() === "学号") {
        // Find student data row
        for (let j = i + 1; j < Math.min(i + 5, rows.length); j++) {
          const c1 = String(rows[j][1] || "").trim();
          const c3 = String(rows[j][3] || "").trim();
          if (c1 && c1 !== "学生中文名" && c3 && c3 !== "课程") {
            blocks.push({headerRow: i, dataRow: j, course: c3, 
              name: c1, engName: String(rows[j][2] || "").trim(),
              semScore: rows[j][5]});
            break;
          }
        }
      }
    }

    // For each block, extract 月考 score
    const courseScores = {};
    const hwProblems = [];
    let studentName = "", studentEng = "";
    
    for (const block of blocks) {
      if (!studentName) { 
        studentName = block.name; 
        studentEng = block.engName;
      }
      if (EXCLUDE.has(block.course)) continue;

      const displayName = RENAME[block.course] || block.course;
      let testScore = null;

      // Find 测验 column in header row
      for (let c = 0; c < rows[block.headerRow].length; c++) {
        const v = String(rows[block.headerRow][c] || "");
        if (!v.includes("测验")) continue;

        // Found 测验 at col c
        // Check if there are sub-items in row headerRow+1
        const subRow = block.headerRow + 1;
        const labelRow = block.headerRow + 2;
        let found = false;
        let bestScore = null; // track best: prefer numeric over Absent over null

        // Scan sub-items: they come in pairs (得分, 总分) starting at c+1
        for (let sc = c + 1; sc < Math.min(c + 30, rows[0].length); sc++) {
          const subName = String(rows[subRow] && rows[subRow][sc] || "");
          const label = String(rows[labelRow] && rows[labelRow][sc] || "");
          
          // Stop if we hit next section header (期中, 期末, or another section)
          const headerCheck = String(rows[block.headerRow][sc] || "");
          if (headerCheck && !headerCheck.includes("测验") && (headerCheck.includes("期中") || headerCheck.includes("期末") || headerCheck.includes("作业") || headerCheck.includes("课堂"))) break;

          if (label === "得分" && subName) {
            // Check if this sub-item is a 月考/Monthly Test
            if (subName.includes("月考") || subName.toLowerCase().includes("monthly")) {
              found = true;
              const val = rows[block.dataRow][sc];
              if (val !== "" && val != null) {
                const parsed = isNaN(Number(val)) ? String(val) : Number(val);
                // Prefer numeric score over string/Absent
                if (typeof parsed === "number") {
                  bestScore = parsed;
                } else if (bestScore === null) {
                  bestScore = parsed;
                }
              }
              // Don't break — keep scanning for one with actual score
            }
          }
        }

        if (found) {
          testScore = bestScore !== null ? bestScore : "Absent";
        }

        // If no 月考 sub-item found, use 测验 cell itself
        if (!found) {
          const val = rows[block.dataRow][c];
          if (val !== "" && val != null && !isNaN(Number(val))) {
            testScore = Number(val);
          }
        }
        break;
      }

      // Extract 期中 (midterm) score
      let midScore = null;
      for (let c = 0; c < rows[block.headerRow].length; c++) {
        const v = String(rows[block.headerRow][c] || "");
        if (!v.includes("期中")) continue;
        // Scan sub-items for actual 期中 exam score
        const subRow = block.headerRow + 1;
        const labelRow = block.headerRow + 2;
        let found = false;
        let bestScore = null;
        for (let sc = c + 1; sc < Math.min(c + 20, rows[0].length); sc++) {
          const subName = String(rows[subRow] && rows[subRow][sc] || "");
          const label = String(rows[labelRow] && rows[labelRow][sc] || "");
          const headerCheck = String(rows[block.headerRow][sc] || "");
          if (headerCheck && !headerCheck.includes("期中") && (headerCheck.includes("期末") || headerCheck.includes("测验") || headerCheck.includes("作业") || headerCheck.includes("课堂"))) break;
          if (label === "得分" && subName && (subName.includes("期中") || subName.toLowerCase().includes("midterm"))) {
            found = true;
            const val = rows[block.dataRow][sc];
            if (val !== "" && val != null) {
              const parsed = isNaN(Number(val)) ? String(val) : Number(val);
              if (typeof parsed === "number") { bestScore = parsed; }
              else if (bestScore === null) { bestScore = parsed; }
            }
          }
        }
        if (found) {
          midScore = bestScore !== null ? bestScore : "Absent";
        } else {
          // Fallback: use the main header cell value
          const val = rows[block.dataRow][c];
          if (val !== "" && val != null) {
            midScore = isNaN(Number(val)) ? String(val) : Number(val);
          } else {
            midScore = "Absent";
          }
        }
        break;
      }

      // Extract 期末 (final) score
      let finalScore = null;
      for (let c = 0; c < rows[block.headerRow].length; c++) {
        const v = String(rows[block.headerRow][c] || "");
        if (!v.includes("期末")) continue;
        const subRow = block.headerRow + 1;
        const labelRow = block.headerRow + 2;
        let found = false;
        let bestScore = null;
        for (let sc = c + 1; sc < Math.min(c + 20, rows[0].length); sc++) {
          const subName = String(rows[subRow] && rows[subRow][sc] || "");
          const label = String(rows[labelRow] && rows[labelRow][sc] || "");
          const headerCheck = String(rows[block.headerRow][sc] || "");
          if (headerCheck && !headerCheck.includes("期末") && (headerCheck.includes("期中") || headerCheck.includes("测验") || headerCheck.includes("作业") || headerCheck.includes("课堂"))) break;
          if (label === "得分" && subName && (subName.includes("期末") || subName.toLowerCase().includes("final"))) {
            found = true;
            const val = rows[block.dataRow][sc];
            if (val !== "" && val != null) {
              const parsed = isNaN(Number(val)) ? String(val) : Number(val);
              if (typeof parsed === "number") { bestScore = parsed; }
              else if (bestScore === null) { bestScore = parsed; }
            }
          }
        }
        if (found) {
          finalScore = bestScore !== null ? bestScore : "Absent";
        } else {
          const val = rows[block.dataRow][c];
          if (val !== "" && val != null) {
            finalScore = isNaN(Number(val)) ? String(val) : Number(val);
          } else {
            finalScore = "Absent";
          }
        }
        break;
      }

      // Extract 问题作业 (homework score <= 50)
      for (let c = 0; c < rows[block.headerRow].length; c++) {
        const v = String(rows[block.headerRow][c] || "");
        if (!v.includes("作业")) continue;
        // Found 作业 section, scan sub-items
        for (let sc = c + 1; sc < rows[block.headerRow].length; sc++) {
          // Stop if we hit the next major section header
          const nextHeader = String(rows[block.headerRow][sc] || "");
          if (nextHeader && sc > c) break;
          // Check if this is a 得分 column
          const labelVal = String(rows[block.headerRow + 2]?.[sc] || "");
          if (labelVal !== "得分") continue;
          const hwName = String(rows[block.headerRow + 1]?.[sc] || "").trim();
          const rawScore = rows[block.dataRow]?.[sc];
          if (rawScore === "" || rawScore == null) continue; // skip blank
          const numScore = Number(rawScore);
          if (isNaN(numScore)) continue;
          if (numScore <= 50) {
            hwProblems.push({
              course: block.course,
              displayName: displayName,
              teacher: courseToTeacher[block.course] || "",
              hwName: hwName,
              score: numScore,
            });
          }
        }
        break;
      }

      courseScores[displayName] = {
        testScore: testScore,
        midScore: midScore,
        finalScore: finalScore,
        semScore: (block.semScore !== "" && block.semScore != null) ? Number(block.semScore) : null,
        courseCN: block.course,
        courseClassName: courseToClass[block.course] || "",
      };
    }

    if (studentName) {
      const m = studentName.match(/（(.+?)）/);
      students.push({
        fullName: studentName,
        cnName: m ? m[1] : studentName,
        engName: studentEng,
        courses: courseScores,
        hwProblems,
        className, semester,
      });
    }
  }

  return students;
}

function buildOutput(students) {
  const allCols = new Set();
  for (const s of students) {
    for (const col of Object.keys(s.courses)) allCols.add(col);
  }

  const sorted = [...allCols].sort((a, b) => {
    const ia = COL_ORDER.indexOf(a);
    const ib = COL_ORDER.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  const EXTRA = new Set(["音乐","体育","美术"]);
  const mainCols = sorted.filter(c => !EXTRA.has(c));
  const extraCols = sorted.filter(c => EXTRA.has(c));

  return { students, mainCols, extraCols };
}

function calcAvg(s, mainCols, scoreFn) {
  let sum = 0, count = 0;
  for (const col of mainCols) {
    const c = s.courses[col];
    const v = c ? scoreFn(c) : null;
    if (v !== null && v !== undefined && typeof v === "number") { sum += v; count++; }
  }
  return count > 0 ? Math.round(sum / count * 10) / 10 : null;
}

const DEFAULT_W = 10;
function setColWidths(ws, mainCols, extraCols, avgCol) {
  const totalCols = avgCol + 1 + extraCols.length;
  for (let c = 1; c <= totalCols; c++) {
    ws.getColumn(c).width = DEFAULT_W;
  }
  ws.getColumn(1).width = 6.5;
}

// Stats helper: compute per-subject avg, pass rate, excellence rate
function subjectStats(students, col, scoreFn) {
  const vals = [];
  for (const s of students) {
    const c = s.courses[col];
    if (c) {
      const v = scoreFn(c);
      if (typeof v === "number") vals.push(v);
    }
  }
  if (vals.length === 0) return {avg: null, pass: null, excel: null};
  const avg = Math.round(vals.reduce((a,b)=>a+b,0) / vals.length);
  const pass = vals.filter(v => v >= 60).length / vals.length;
  const excel = vals.filter(v => v >= 80).length / vals.length;
  return {avg, pass: Math.round(pass*100)/100, excel: Math.round(excel*100)/100};
}

function addStatsSection(ws, students, mainCols, extraCols, avgCol, spacerCol, config, FONT) {
  const V = "middle";
  const YELLOW_FILL = {type:'pattern',pattern:'solid',fgColor:{argb:'FFFFF9E0'}};
  const PURPLE_FILL = {type:'pattern',pattern:'solid',fgColor:{argb:'FFF2C7FF'}};
  const STAT_GREEN = {type:'pattern',pattern:'solid',fgColor:{argb:'FF92D050'}};
  const STAT_RED = {type:'pattern',pattern:'solid',fgColor:{argb:'FFFFC9C7'}};
  const allBorder = {top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};
  const PCT_FMT = '0%';
  const allCols = [...mainCols, ...extraCols];
  const isCompare = config.exams.length === 2;

  // 4 empty rows
  for (let i = 0; i < 4; i++) ws.addRow([]);

  // Subject header row
  const hdrRow = new Array(spacerCol + extraCols.length).fill(null);
  for (let i = 0; i < mainCols.length; i++) hdrRow[3 + i] = mainCols[i];
  hdrRow[avgCol - 1] = "平均"; // avgCol position (0-indexed = avgCol-1)
  for (let i = 0; i < extraCols.length; i++) hdrRow[spacerCol + i] = extraCols[i];
  const hr = ws.addRow(hdrRow);
  hr.height = 19;
  hr.eachCell(c => { c.font = {...FONT, bold:true}; c.alignment = {vertical:V, horizontal:"center"}; if (c.value && String(c.value).trim()) c.fill = YELLOW_FILL; });

  // Helper to add a stats data row
  function addStatRow(label, metricFn, fmt, isTrend) {
    const rowData = new Array(spacerCol + extraCols.length).fill(null);
    rowData[2] = label;
    const mainVals = [];
    for (let i = 0; i < mainCols.length; i++) {
      const v = metricFn(mainCols[i]);
      rowData[3 + i] = v;
      if (typeof v === "number") mainVals.push(v);
    }
    // 平均 = average of mainCols only (exclude 音体美)
    if (mainVals.length > 0) {
      rowData[avgCol - 1] = Math.round(mainVals.reduce((a,b)=>a+b,0) / mainVals.length * 100) / 100;
    }
    for (let i = 0; i < extraCols.length; i++) {
      const v = metricFn(extraCols[i]);
      rowData[spacerCol + i] = v;
    }
    const r = ws.addRow(rowData);
    r.height = 19;
    r.eachCell(c => { c.font = FONT; c.alignment = {vertical:V, horizontal:"center"}; });
    r.getCell(3).font = {...FONT, bold:true};
    if (fmt) {
      for (let i = 0; i < mainCols.length; i++) r.getCell(4 + i).numFmt = fmt;
      r.getCell(avgCol).numFmt = fmt;
      for (let i = 0; i < extraCols.length; i++) r.getCell(spacerCol + 1 + i).numFmt = fmt;
    }
    if (isTrend) {
      r.getCell(3).fill = PURPLE_FILL;
      for (let i = 0; i < mainCols.length; i++) {
        const cell = r.getCell(4 + i);
        if (typeof cell.value === "number") cell.fill = cell.value >= 0 ? STAT_GREEN : STAT_RED;
      }
      const avgCell = r.getCell(avgCol);
      if (typeof avgCell.value === "number") avgCell.fill = avgCell.value >= 0 ? STAT_GREEN : STAT_RED;
      for (let i = 0; i < extraCols.length; i++) {
        const cell = r.getCell(spacerCol + 1 + i);
        if (typeof cell.value === "number") cell.fill = cell.value >= 0 ? STAT_GREEN : STAT_RED;
      }
    }
    // Borders
    for (let c = 3; c <= avgCol; c++) r.getCell(c).border = allBorder;
    for (let i = 0; i < extraCols.length; i++) r.getCell(spacerCol + 1 + i).border = allBorder;
    return r;
  }

  // Borders on header row
  for (let c = 3; c <= avgCol; c++) hr.getCell(c).border = allBorder;
  for (let i = 0; i < extraCols.length; i++) hr.getCell(spacerCol + 1 + i).border = allBorder;

  // Compute stats for each exam
  const statsPerExam = config.exams.map(exam => {
    const result = {};
    for (const col of allCols) {
      result[col] = subjectStats(students, col, exam.fn);
    }
    return result;
  });

  // Helper: average of a metric across all subjects
  function allSubjAvg(examIdx, metric) {
    const vals = [];
    for (const col of mainCols) {
      const v = statsPerExam[examIdx][col]?.[metric];
      if (typeof v === "number") vals.push(v);
    }
    return vals.length > 0 ? Math.round(vals.reduce((a,b)=>a+b,0) / vals.length * 100) / 100 : null;
  }

  // === 均分 ===
  if (!isCompare) {
    addStatRow("均分", col => statsPerExam[0][col]?.avg ?? null, '0');
  } else {
    addStatRow(config.exams[0].name + "平均分", col => statsPerExam[0][col]?.avg ?? null, '0');
    addStatRow(config.exams[1].name + "平均分", col => statsPerExam[1][col]?.avg ?? null, '0');
    // Trend row: per-subject (new-old)/old, 平均 column also (new-old)/old
    const oldAvgAll = allSubjAvg(0, "avg");
    const newAvgAll = allSubjAvg(1, "avg");
    const r = addStatRow("趋势", col => {
      const a = statsPerExam[0][col]?.avg;
      const b = statsPerExam[1][col]?.avg;
      if (a && b && a !== 0) return Math.round((b - a) / a * 100) / 100;
      return null;
    }, PCT_FMT, true);
    // Override 平均 cell with (new-old)/old
    if (oldAvgAll && newAvgAll && oldAvgAll !== 0) {
      r.getCell(avgCol).value = Math.round((newAvgAll - oldAvgAll) / oldAvgAll * 100) / 100;
      r.getCell(avgCol).numFmt = PCT_FMT;
      r.getCell(avgCol).fill = r.getCell(avgCol).value >= 0 ? STAT_GREEN : STAT_RED;
    }
    ws.addRow([]);
  }

  // === 及格率 ===
  if (!isCompare) {
    addStatRow("及格率", col => statsPerExam[0][col]?.pass ?? null, PCT_FMT);
  } else {
    addStatRow(config.exams[0].name + "及格率", col => statsPerExam[0][col]?.pass ?? null, PCT_FMT);
    addStatRow(config.exams[1].name + "及格率", col => statsPerExam[1][col]?.pass ?? null, PCT_FMT);
    const oldPassAll = allSubjAvg(0, "pass");
    const newPassAll = allSubjAvg(1, "pass");
    const r = addStatRow("趋势", col => {
      const a = statsPerExam[0][col]?.pass;
      const b = statsPerExam[1][col]?.pass;
      if (a !== null && b !== null) return Math.round((b - a) * 100) / 100;
      return null;
    }, PCT_FMT, true);
    if (oldPassAll !== null && newPassAll !== null && oldPassAll !== 0) {
      r.getCell(avgCol).value = Math.round((newPassAll - oldPassAll) / oldPassAll * 100) / 100;
      r.getCell(avgCol).numFmt = PCT_FMT;
      r.getCell(avgCol).fill = r.getCell(avgCol).value >= 0 ? STAT_GREEN : STAT_RED;
    }
    ws.addRow([]);
  }

  // === 优秀率 ===
  if (!isCompare) {
    addStatRow("优秀率", col => statsPerExam[0][col]?.excel ?? null, PCT_FMT);
  } else {
    addStatRow(config.exams[0].name + "优秀率", col => statsPerExam[0][col]?.excel ?? null, PCT_FMT);
    addStatRow(config.exams[1].name + "优秀率", col => statsPerExam[1][col]?.excel ?? null, PCT_FMT);
    const oldExcelAll = allSubjAvg(0, "excel");
    const newExcelAll = allSubjAvg(1, "excel");
    const r = addStatRow("趋势", col => {
      const a = statsPerExam[0][col]?.excel;
      const b = statsPerExam[1][col]?.excel;
      if (a !== null && b !== null) return Math.round((b - a) * 100) / 100;
      return null;
    }, PCT_FMT, true);
    if (oldExcelAll !== null && newExcelAll !== null && oldExcelAll !== 0) {
      r.getCell(avgCol).value = Math.round((newExcelAll - oldExcelAll) / oldExcelAll * 100) / 100;
      r.getCell(avgCol).numFmt = PCT_FMT;
      r.getCell(avgCol).fill = r.getCell(avgCol).value >= 0 ? STAT_GREEN : STAT_RED;
    }
  }
}

async function dlExcel(students, mainCols, extraCols, withGPA = false, noSem = false) {
  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet("月考成绩统计");
  const FONT = {name:"Arial", size:11};
  const V = "middle";
  const AVG_FMT = '0.0';
  const ORANGE_FILL = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFCE4C8'}};
  const RED_FONT = {...FONT, color:{argb:'FFFF0000'}};

  let classShort = "";
  const cn = students[0]?.className || "";
  const cnMatch = cn.match(/（(.+?)）/);
  if (cnMatch) classShort = cnMatch[1] + "班";
  else { const gm = cn.match(/(\d+)年级(\d+)班/); if (gm) classShort = gm[1] + "年级" + gm[2] + "班"; }
  let semPart = "";
  const semStr = students[0]?.semester || "";
  const ym = semStr.match(/(\d{4}-\d{4})学年/);
  const sm = semStr.match(/第(\d)学期/);
  if (ym && sm) semPart = ym[1] + "学年第" + sm[1] + "学期";

  const title = classShort + semPart + "月考成绩数据" + (noSem ? "（不含综合成绩）" : "");
  const r1 = ws.addRow([title]);
  r1.height = 40;
  r1.getCell(1).font = {...FONT, bold:true, size:20};
  r1.getCell(1).alignment = {vertical:V, horizontal:"center"};

  const avgCol = 4 + mainCols.length;
  const gpaCol = withGPA ? avgCol + 1 : null;
  const edgeCol = withGPA ? avgCol + 1 : avgCol;
  const spacerColX = edgeCol + 1;
  ws.mergeCells(1, 1, 1, edgeCol);
  if (extraCols.length > 0) {
    const extStart = spacerColX + 1;
    const extEnd = spacerColX + extraCols.length;
    ws.mergeCells(1, extStart, 1, extEnd);
    const ec = ws.getRow(1).getCell(extStart);
    ec.value = "音体美";
    ec.font = {...FONT, bold:true, size:20};
    ec.alignment = {vertical:V, horizontal:"center"};
  }

  const headerData = ["序号", "姓名", "分数类别"];
  for (const col of mainCols) headerData.push(col);
  headerData.push("均分");
  if (withGPA) headerData.push("GPA");
  headerData.push("");
  for (const col of extraCols) headerData.push(col);
  
  const hRow = ws.addRow(headerData);
  hRow.height = 19;
  hRow.eachCell(c => { c.font = {...FONT, bold:true}; c.alignment = {vertical:V, horizontal:"center"}; if (c.value && String(c.value).trim()) c.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFFF9E0'}}; });

  setColWidths(ws, mainCols, extraCols, edgeCol);

  // Sort by 月考卷面均分 descending
  const sorted = [...students].sort((a, b) => {
    const aa = calcAvg(a, mainCols, c => c.testScore);
    const bb = calcAvg(b, mainCols, c => c.testScore);
    return (bb ?? -Infinity) - (aa ?? -Infinity);
  });

  const rowsPerStudent = noSem ? 1 : 2;
  for (let si = 0; si < sorted.length; si++) {
    const s = sorted[si];

    const testRow = [si + 1, s.cnName, "月考卷面"];

async function dlCompare(students, mainCols, extraCols, withGPA = false, noSem = false) {
  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet("月考期中对比");
  const FONT = {name:"Arial", size:11};
  const V = "middle";
  const AVG_FMT = '0.0';
  const TREND_FMT = '0.0';
  const GREEN_FILL = {type:'pattern', pattern:'solid', fgColor:{argb:'FFD5F5D5'}};
  const RED_FILL = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFFD5D5'}};
  const ORANGE_FILL = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFCE4C8'}};
  const RED_FONT = {...FONT, color:{argb:'FFFF0000'}};

  let classShort = "";
  const cn = students[0]?.className || "";
  const cnMatch = cn.match(/（(.+?)）/);
  if (cnMatch) classShort = cnMatch[1] + "班";
  else { const gm = cn.match(/(\d+)年级(\d+)班/); if (gm) classShort = gm[1] + "年级" + gm[2] + "班"; }
  let semPart = "";
  const semStr = students[0]?.semester || "";
  const ym = semStr.match(/(\d{4}-\d{4})学年/);
  const sm = semStr.match(/第(\d)学期/);
  if (ym && sm) semPart = ym[1] + "学年第" + sm[1] + "学期";
  const title = classShort + semPart + "月考/期中成绩对比";

  const avgCol = 4 + mainCols.length;
  const trendCol = avgCol + 1;
  const gpaCol = withGPA ? trendCol + 1 : null;
  const edgeCol = withGPA ? trendCol + 1 : trendCol;
  const spacerColX = edgeCol + 1;

  const r1 = ws.addRow([title]);
  r1.height = 40;
  r1.getCell(1).font = {...FONT, bold:true, size:20};
  r1.getCell(1).alignment = {vertical:V, horizontal:"center"};
  ws.mergeCells(1, 1, 1, edgeCol);
  if (extraCols.length > 0) {
    const extStart = spacerColX + 1;
    const extEnd = spacerColX + extraCols.length;
    ws.mergeCells(1, extStart, 1, extEnd);
    const ec = ws.getRow(1).getCell(extStart);
    ec.value = "音体美";
    ec.font = {...FONT, bold:true, size:20};
    ec.alignment = {vertical:V, horizontal:"center"};
  }

  const headerData = ["序号", "姓名", "分数类别"];
  for (const col of mainCols) headerData.push(col);
  headerData.push("均分");
  headerData.push("趋势");
  if (withGPA) headerData.push("GPA");
  headerData.push(""); // spacer
  for (const col of extraCols) headerData.push(col);

  const hRow = ws.addRow(headerData);
  hRow.height = 19;
  hRow.eachCell(c => { c.font = {...FONT, bold:true}; c.alignment = {vertical:V, horizontal:"center"}; if (c.value && String(c.value).trim()) c.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFFF9E0'}}; });

  // Column widths
  const totalCols = spacerColX + extraCols.length;
  for (let c = 1; c <= totalCols; c++) ws.getColumn(c).width = DEFAULT_W;
  ws.getColumn(1).width = 6.5;

  // Sort by 期中卷面均分 descending
  const sorted = [...students].sort((a, b) => {
    const aa = calcAvg(a, mainCols, c => c.midScore);
    const bb = calcAvg(b, mainCols, c => c.midScore);
    return (bb ?? -Infinity) - (aa ?? -Infinity);
  });

  for (let si = 0; si < sorted.length; si++) {
    const s = sorted[si];

    function buildRow(label, getScore) {
      const row = [label === "月考卷面" ? si + 1 : null, label === "月考卷面" ? s.cnName : null, label];
      for (const col of mainCols) {
        const c = s.courses[col];
        const v = c ? getScore(c) : null;
        row.push(v !== null && v !== undefined ? v : null);
      }
      row.push(calcAvg(s, mainCols, getScore));
      row.push(null); // trend
      if (withGPA) row.push(null); // GPA
      row.push(null); // spacer
      for (const col of extraCols) {
        const c = s.courses[col];
        const v = c ? getScore(c) : null;
        row.push(v !== null && v !== undefined ? v : null);
      }
      return row;
    }

    const tr = ws.addRow(buildRow("月考卷面", c => c.testScore));
    tr.height = 19;
    tr.eachCell(c => { c.font = FONT; c.alignment = {vertical:V, horizontal:"center"}; });
    tr.getCell(avgCol).numFmt = AVG_FMT;

    const mr = ws.addRow(buildRow("期中卷面", c => c.midScore));
    mr.height = 19;
    mr.eachCell(c => { c.font = FONT; c.alignment = {vertical:V, horizontal:"center"}; });
    mr.getCell(avgCol).numFmt = AVG_FMT;
    for (let i = 0; i < mainCols.length; i++) {
      const c = s.courses[mainCols[i]];
      const cell = mr.getCell(4 + i);
      if (c && typeof c.midScore !== "number") { cell.value = null; cell.fill = ORANGE_FILL; }
      else if (c && c.midScore < 70) { cell.font = RED_FONT; }
    }
    for (let i = 0; i < extraCols.length; i++) {
      const c = s.courses[extraCols[i]];
      const cell = mr.getCell(spacerColX + 1 + i);
      if (c && typeof c.midScore !== "number") { cell.value = null; cell.fill = ORANGE_FILL; }
      else if (c && c.midScore < 70) { cell.font = RED_FONT; }
    }

    if (!noSem) {
    const sr = ws.addRow(buildRow("综合成绩", c => c.semScore));
    sr.height = 19;
    sr.eachCell(c => { c.font = FONT; c.alignment = {vertical:V, horizontal:"center"}; });
    sr.getCell(avgCol).numFmt = AVG_FMT;
    }

    // Trend: 期中均分 - 月考均分
    const midA = calcAvg(s, mainCols, c => c.midScore);
    const testA = calcAvg(s, mainCols, c => c.testScore);
    const trend = (midA !== null && testA !== null) ? Math.round((midA - testA) * 10) / 10 : null;

    const rps = noSem ? 2 : 3;
    const rowNum = 3 + si * rps;
    ws.mergeCells(rowNum, 1, rowNum + rps - 1, 1);
    ws.mergeCells(rowNum, 2, rowNum + rps - 1, 2);
    ws.mergeCells(rowNum, trendCol, rowNum + rps - 1, trendCol);

    const trendCell = ws.getRow(rowNum).getCell(trendCol);
    trendCell.value = trend;
    trendCell.numFmt = TREND_FMT;
    trendCell.font = FONT;
    trendCell.alignment = {vertical:V, horizontal:"center"};
    if (trend !== null) {
      trendCell.fill = trend >= 0 ? GREEN_FILL : RED_FILL;
    }

    if (withGPA) {
      ws.mergeCells(rowNum, gpaCol, rowNum + rps - 1, gpaCol);
      const gc = ws.getRow(rowNum).getCell(gpaCol);
      gc.value = calcStudentGPA(s); gc.numFmt = '0.00'; gc.font = FONT; gc.alignment = {vertical:V, horizontal:"center"};
    }
  }

  const lastRow = 2 + sorted.length * (noSem ? 2 : 3);
  const lastCol = spacerColX + extraCols.length;
  
  const allBorder = {top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};
  for (let r = 1; r <= lastRow; r++) {
    const row = ws.getRow(r);
    for (let c = 1; c <= lastCol; c++) {
      if (c === spacerColX) continue;
      row.getCell(c).border = allBorder;
    }
  }

  addStatsSection(ws, sorted, mainCols, extraCols, avgCol, spacerColX, {
    exams: [{name:"月考", fn: c => c.testScore}, {name:"期中", fn: c => c.midScore}]
  }, FONT);

  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:"application/octet-stream"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "月考期中对比.xlsx";
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== Vertical individual score card builder =====
function buildVerticalCards(wb, students, mainCols, extraCols, cfg, withGPA) {
  const BLUE = '1B3A66';
  const V = 'middle';
  const HEADER_BG = {type:'pattern', pattern:'solid', fgColor:{argb:'FF'+BLUE}};
  const ZEBRA = {type:'pattern', pattern:'solid', fgColor:{argb:'FFF5F7FA'}};
  const TH_BG = {type:'pattern', pattern:'solid', fgColor:{argb:'FFEFF2F7'}};
  const EXTRA_BG = {type:'pattern', pattern:'solid', fgColor:{argb:'FFF8F9FB'}};
  const ORANGE_FILL = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFCE4C8'}};
  const TREND_GREEN_BG = {type:'pattern', pattern:'solid', fgColor:{argb:'FFEDF7F0'}};
  const TREND_RED_BG = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFDF4F3'}};

  const F_NAME = {name:'Microsoft YaHei', size:16, bold:true, color:{argb:'FFFFFFFF'}};
  const F_SUB = {name:'Microsoft YaHei', size:10, color:{argb:'FF8FA8C8'}};
  const F_TH = {name:'Microsoft YaHei', size:10, bold:true, color:{argb:'FF5A6B7F'}};
  const F = {name:'Microsoft YaHei', size:10, color:{argb:'FF333333'}};
  const F_LIGHT = {name:'Microsoft YaHei', size:10, color:{argb:'FF999999'}};
  const F_RED = {name:'Microsoft YaHei', size:10, color:{argb:'FFEE0000'}};
  const F_AVG = {name:'Microsoft YaHei', size:11, bold:true, color:{argb:'FF'+BLUE}};
  const F_AVG_LIGHT = {name:'Microsoft YaHei', size:11, bold:true, color:{argb:'FF8FAABE'}};
  const F_GRAY9 = {name:'Microsoft YaHei', size:9, color:{argb:'FF999999'}};
  const F_GRAY9B = {name:'Microsoft YaHei', size:9, bold:true, color:{argb:'FF999999'}};
  const F_BLUE_B = {name:'Microsoft YaHei', size:10, bold:true, color:{argb:'FF'+BLUE}};
  const F_GREEN_B = {name:'Microsoft YaHei', size:12, bold:true, color:{argb:'FF2E7D32'}};
  const F_RED_B = {name:'Microsoft YaHei', size:12, bold:true, color:{argb:'FFC4554D'}};
  const F_DARK_B = {name:'Microsoft YaHei', size:10, bold:true, color:{argb:'FF222222'}};
  const MED = {style:'medium', color:{argb:'FF'+BLUE}};
  const THIN_LINE = {style:'thin', color:{argb:'FFE8ECF0'}};
  const TH_BOTTOM = {style:'thin', color:{argb:'FFD0D8E0'}};
  const AVG_TOP_B = {top:MED};
  const BODY_B = {bottom:THIN_LINE};
  const AL_L = {horizontal:'left', vertical:V, indent:1};
  const AL_C = {horizontal:'center', vertical:V};
  const AL_R = {horizontal:'right', vertical:V};

  const nScores = cfg.scoreHeaders.length;
  // Columns: A=margin, B=pad, C=subject, D..=scores, next=pad, next=margin
  const subjCol = 3;
  const firstSC = 4;
  const lastSC = 3 + nScores;
  const padCol = lastSC + 1;

  const sorted = [...students].sort((a,b) => {
    const aa = cfg.sortFn(a, mainCols);
    const bb = cfg.sortFn(b, mainCols);
    return (bb ?? -Infinity) - (aa ?? -Infinity);
  });

  for (let si = 0; si < sorted.length; si++) {
    const s = sorted[si];
    const ws = wb.addWorksheet(s.cnName || ("学生"+(si+1)));
    ws.views = [{showGridLines: false}];

    // Column widths
    ws.getColumn(1).width = 8;   // left margin
    ws.getColumn(2).width = 2;   // left pad
    ws.getColumn(subjCol).width = 18;
    for (let c = firstSC; c <= lastSC; c++) ws.getColumn(c).width = 13;
    ws.getColumn(padCol).width = 2;  // right pad

    function addR(h) { const r = ws.addRow([]); r.height = h; return r; }
    function setCell(row, col, val, font, align, fill, border) {
      const c = ws.getRow(row).getCell(col);
      if (val !== undefined && val !== null) c.value = val;
      if (font) c.font = font;
      if (align) c.alignment = align;
      if (fill) c.fill = fill;
      if (border) c.border = border;
      return c;
    }

    // Row 1: top margin
    addR(40);
    let curRow = 1;

    // === DEEP BLUE HEADER BLOCK ===
    const frameStart = 2;
    // Rows 2-6: blue header
    for (let r = 2; r <= 6; r++) {
      addR(r === 2 ? 30 : r === 3 ? 32 : r === 4 ? 20 : r === 5 ? 10 : 8);
      for (let c = 2; c <= padCol; c++) setCell(r, c, null, null, null, HEADER_BG);
    }
    // Row 3: student name
    setCell(3, subjCol, s.cnName, F_NAME, {horizontal:'left', vertical:V}, HEADER_BG);
    // Row 4: subtitle
    setCell(4, subjCol, cfg.titleLine2, F_SUB, {horizontal:'left', vertical:V}, HEADER_BG);
    curRow = 6;

    // Row 7: spacer
    addR(8); curRow = 7;
    // Row 8: spacer
    addR(6); curRow = 8;

    // === TABLE HEADER ===
    addR(28); curRow = 9;
    const thBorder = {bottom:TH_BOTTOM};
    setCell(curRow, subjCol, "科目", F_TH, AL_L, TH_BG, thBorder);
    for (let i = 0; i < nScores; i++) {
      setCell(curRow, firstSC+i, cfg.scoreHeaders[i], F_TH, AL_C, TH_BG, thBorder);
    }

    // Filter subjects
    const stuMainCols = mainCols.filter(col => {
      const c = s.courses[col];
      if (!c) return false;
      return cfg.getScores(c).some(v => v !== null && v !== undefined);
    });
    const stuExtraCols = extraCols.filter(col => {
      const c = s.courses[col];
      if (!c) return false;
      return cfg.getExtraScores(c).some(v => v !== null && v !== undefined);
    });

    // === SUBJECT ROWS ===
    curRow = 10;
    for (let di = 0; di < stuMainCols.length; di++) {
      const col = stuMainCols[di];
      const course = s.courses[col];
      const scores = course ? cfg.getScores(course) : new Array(nScores).fill(null);
      addR(26);
      const zebraFill = di % 2 === 1 ? ZEBRA : undefined;
      setCell(curRow, subjCol, col, F, AL_L, zebraFill, BODY_B);
      for (let j = 0; j < nScores; j++) {
        const v = scores[j];
        const isNum = typeof v === 'number';
        let font = F;
        if (cfg.lightCol !== null && j === cfg.lightCol) font = F_LIGHT;
        if (isNum && v < 70 && j === cfg.highlightCol) font = F_RED;
        // Highlight logic: orange for unrecorded at highlightCol, 缺考 for lightCol
        if (!isNum && course) {
          if (j === cfg.highlightCol) {
            setCell(curRow, firstSC+j, null, font, AL_C, ORANGE_FILL, BODY_B);
          } else {
            setCell(curRow, firstSC+j, null, font, AL_C, zebraFill, BODY_B);
          }
        } else {
          setCell(curRow, firstSC+j, isNum ? v : null, font, AL_C, zebraFill, BODY_B);
        }
      }
      curRow++;
    }

    // === AVERAGE ROW ===
    const avgRow = curRow;
    addR(30);
    setCell(curRow, subjCol, "均分", F_AVG, AL_L, undefined, AVG_TOP_B);
    const avgs = cfg.getAvgs(s, stuMainCols);
    for (let j = 0; j < nScores; j++) {
      const font = (cfg.lightCol !== null && j === cfg.lightCol) ? F_AVG_LIGHT : F_AVG;
      const c = setCell(curRow, firstSC+j, avgs[j], font, AL_C, undefined, AVG_TOP_B);
      c.numFmt = '0.0';
    }
    curRow++;

    // Spacer
    addR(10); curRow++;

    // === 音体美 ===
    if (stuExtraCols.length > 0) {
      addR(22);
      setCell(curRow, subjCol, "音体美", F_GRAY9B, AL_L, EXTRA_BG);
      for (let c = firstSC; c <= lastSC; c++) setCell(curRow, c, null, null, null, EXTRA_BG);
      curRow++;
      for (let ei = 0; ei < stuExtraCols.length; ei++) {
        const col = stuExtraCols[ei];
        const course = s.courses[col];
        const scores = course ? cfg.getExtraScores(course) : new Array(nScores).fill(null);
        addR(24);
        setCell(curRow, subjCol, col, F_GRAY9, AL_L, undefined, BODY_B);
        for (let j = 0; j < nScores; j++) {
          const v = scores[j];
          const c = setCell(curRow, firstSC+j, typeof v === 'number' ? v : null, F_GRAY9, AL_C, undefined, BODY_B);
          if (j === nScores - 1 && typeof v === 'number') c.numFmt = '0.0';
        }
        curRow++;
      }
    }

    // Spacer
    addR(12); curRow++;

    // === TREND ROW ===
    const hasTrend = cfg.getTrend !== null;
    if (hasTrend) {
      addR(28);
      setCell(curRow, lastSC-1, "均分趋势", F_BLUE_B, AL_R);
      const trend = cfg.getTrend(s, stuMainCols);
      if (trend !== null) {
        const tc = setCell(curRow, lastSC, trend, trend >= 0 ? F_GREEN_B : F_RED_B, AL_C);
        tc.numFmt = '+0.0;-0.0;0.0';
      }
      curRow++;
    }

    // === GPA ROW ===
    if (withGPA) {
      addR(hasTrend ? 16 : 20);
      setCell(curRow, lastSC-1, "GPA", F_BLUE_B, AL_R);
      const gpa = calcStudentGPA(s);
      const c = setCell(curRow, lastSC, gpa, {...F_DARK_B, size:11}, AL_C);
      c.numFmt = '0.00';
      curRow++;
    }

    // Bottom spacer
    const frameEnd = curRow;
    addR(10); curRow++;

    // === FRAME BORDER ===
    for (let r = frameStart; r <= frameEnd; r++) {
      ws.getRow(r).getCell(2).border = {
        left: MED,
        top: r === frameStart ? MED : undefined,
        bottom: r === frameEnd ? MED : undefined,
      };
      ws.getRow(r).getCell(padCol).border = {
        right: MED,
        top: r === frameStart ? MED : undefined,
        bottom: r === frameEnd ? MED : undefined,
      };
      if (r === frameStart || r === frameEnd) {
        for (let c = 3; c < padCol; c++) {
          const existing = ws.getRow(r).getCell(c).border || {};
          ws.getRow(r).getCell(c).border = {
            ...existing,
            top: r === frameStart ? MED : existing.top,
            bottom: r === frameEnd ? MED : existing.bottom,
          };
        }
      }
    }

    // Re-apply avg row blue top (frame border pass may overwrite)
    for (let c = subjCol; c <= lastSC; c++) {
      ws.getRow(avgRow).getCell(c).border = AVG_TOP_B;
    }
  }
}

// ===== Makeup exam list functions =====

// Makeup exam subject grouping: maps courseScores key -> broader category
const MAKEUP_GROUP = {
  "AP预备微积分":"数学","AP微积分":"数学","AP统计":"数学","数学":"数学",
  "AP物理1":"物理","AP物理2":"物理","AP物理C":"物理","物理":"物理",
  "AP化学":"化学","化学":"化学",
  "生物一册":"生物","生物二册":"生物","AP生物":"生物","生物":"生物",
  "语文一册":"语文","语文二册":"语文",
  "计算机":"经济学/AP计算机","AP计算机科学":"经济学/AP计算机","AP微观经济":"经济学/AP计算机","AP宏观经济":"经济学/AP计算机","AP宏观经济学":"经济学/AP计算机","经济学":"经济学/AP计算机",
};
const MAKEUP_ORDER = [
  "听说","读写","托福课程","文书写作","英美文学","文学",
  "数学","物理","化学","生物","语文",
  "经济学/AP计算机",
  "美国历史","世界历史","中国历史","AP心理学","AP研讨会","知识论TOK",
  "美术","戏剧","小语种","音乐","体育",
];

function buildMakeupData(students, scoreFn) {
  // Group: subject category -> class name -> [{name, score}]
  const groups = {};
  for (const s of students) {
    for (const key of Object.keys(s.courses)) {
      const c = s.courses[key];
      const score = scoreFn(c);
      if (typeof score === "number" && score < 70) {
        const subject = MAKEUP_GROUP[key] || key;
        const cls = c.courseClassName || c.courseCN || key;
        if (!groups[subject]) groups[subject] = {};
        if (!groups[subject][cls]) groups[subject][cls] = [];
        groups[subject][cls].push({name: s.cnName, score: score});
      }
    }
  }
  return groups;
}

async function dlMakeup(students, mainCols, extraCols, examType) {
  const isMid = examType === "mid";
  const scoreFn = isMid ? (c => c.midScore) : (c => c.finalScore);
  const groups = buildMakeupData(students, scoreFn);
  
  if (Object.keys(groups).length === 0) {
    alert(isMid ? "没有期中考试低于70分的学生" : "没有期末考试低于70分的学生");
    return;
  }

  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet("建议补考名单");
  ws.views = [{showGridLines: false}];
  const FONT = {name:"Arial", size:11};
  const V = "middle";
  const BLUE_FILL = {type:'pattern', pattern:'solid', fgColor:{argb:'FFDCE6F1'}};
  const allBorder = {top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};

  let classShort = "";
  const cn = students[0]?.className || "";
  const cnMatch = cn.match(/（(.+?)）/);
  if (cnMatch) classShort = cnMatch[1] + "班";
  else { const gm = cn.match(/(\d+)年级(\d+)班/); if (gm) classShort = gm[1] + "年级" + gm[2] + "班"; }
  let semPart = "";
  const semStr = students[0]?.semester || "";
  const ym = semStr.match(/(\d{4}-\d{4})学年/);
  const sm = semStr.match(/第(\d)学期/);
  if (ym && sm) semPart = ym[1] + "学年第" + sm[1] + "学期";

  const examLabel = isMid ? "期中" : "期末";
  const titleText = semPart + " " + classShort + " " + examLabel + "建议补考学生名单";
  const r1 = ws.addRow([""]);
  r1.height = 60;
  r1.getCell(1).value = {richText: [
    {font: {name:"Arial", size:17, bold:true}, text: titleText + "\n"},
    {font: {name:"Arial", size:12, color:{argb:'FF666666'}}, text: "卷面成绩低于70分自动加入建议补考名单"}
  ]};
  r1.getCell(1).alignment = {vertical:V, horizontal:"center", wrapText:true};

  const hRow = ws.addRow(["科目", "班级", "建议补考学生名单"]);
  hRow.height = 35;
  hRow.eachCell(c => { c.font = {...FONT, bold:true, size:12}; c.alignment = {vertical:V, horizontal:"center"}; c.fill = BLUE_FILL; c.border = allBorder; });

  ws.getColumn(1).width = 14;
  ws.getColumn(2).width = 30;

  // Determine subject ordering for makeup list
  const MAKEUP_ORDER = [
    "听说","读写","托福课程","文书写作","英美文学",
    "文学","数学",
    "物理","生物","化学",
    "语文",
    "经济学/AP计算机","AP心理学","AP研讨会",
    "美国历史","世界历史","中国历史",
    "小语种","美术","戏剧","音乐","体育",
    "计算机","知识论TOK","Capstone",
  ];
  const orderedSubjects = Object.keys(groups).sort((a, b) => {
    const ia = MAKEUP_ORDER.indexOf(a);
    const ib = MAKEUP_ORDER.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  let maxStudents = 0;
  for (const subj of orderedSubjects) {
    for (const cls of Object.keys(groups[subj])) {
      maxStudents = Math.max(maxStudents, groups[subj][cls].length);
    }
  }
  for (let c = 3; c <= 2 + maxStudents; c++) ws.getColumn(c).width = 12;
  if (maxStudents > 1) {
    ws.mergeCells(2, 3, 2, 2 + maxStudents);
  }

  // Helper: strip semester prefix from class names
  function cleanClassName(cls) {
    // Remove patterns like "25秋 ", "25春 ", "金盏26春", "25 金盏..."
    return cls.replace(/^(?:\d{2,4}\s*)?(?:金盏|北外)?\d{0,4}[秋春]\s*/,"").replace(/^\d{2,4}\s+/,"").trim();
  }

  const RED_FONT_M = {...FONT, size:10, color:{argb:'FF999999'}};

  for (const subj of orderedSubjects) {
    const classes = Object.keys(groups[subj]).sort();
    const groupStartRow = ws.rowCount + 1;
    for (const cls of classes) {
      const entries = groups[subj][cls].sort((a, b) => a.score - b.score);
      // Name row
      const nameRow = ["", cleanClassName(cls), ...entries.map(e => e.name)];
      const nr = ws.addRow(nameRow);
      nr.height = 30;
      nr.eachCell(c => { c.font = FONT; c.alignment = {vertical:V, horizontal:"center"}; });
      // Score row
      const scoreRow = ["", "", ...entries.map(e => e.score)];
      const sr = ws.addRow(scoreRow);
      sr.height = 16;
      sr.eachCell(c => { c.font = RED_FONT_M; c.alignment = {vertical:V, horizontal:"center"}; });
      // Merge 班级 cell across two rows
      const nrNum = nr.number;
      ws.mergeCells(nrNum, 2, nrNum + 1, 2);
      ws.getRow(nrNum).getCell(2).alignment = {vertical:V, indent:1};
    }
    const groupEndRow = ws.rowCount;
    if (groupEndRow >= groupStartRow) {
      if (groupEndRow > groupStartRow) {
        ws.mergeCells(groupStartRow, 1, groupEndRow, 1);
      }
      const subjCell = ws.getRow(groupStartRow).getCell(1);
      subjCell.value = subj;
      subjCell.font = {...FONT, bold:true};
      subjCell.alignment = {vertical:V, horizontal:"center"};
    }
  }

  // Full grid borders: from header row (2) to last data row, columns 1 to (2 + maxStudents)
  const lastDataRow = ws.rowCount;
  const lastCol = 2 + maxStudents;
  for (let r = 2; r <= lastDataRow; r++) {
    const row = ws.getRow(r);
    for (let c = 1; c <= lastCol; c++) {
      row.getCell(c).border = allBorder;
    }
  }

  // Merge title row
  ws.mergeCells(1, 1, 1, Math.max(3, lastCol));

  // === Sheet 2: By student ===
  const ws2 = wb.addWorksheet("各学生建议补考科目");
  ws2.views = [{showGridLines: false}];

  const title2Text = semPart + " " + classShort + " " + examLabel + "各学生建议补考科目";
  const r1s2 = ws2.addRow([""]);
  r1s2.height = 60;
  r1s2.getCell(1).value = {richText: [
    {font: {name:"Arial", size:17, bold:true}, text: title2Text + "\n"},
    {font: {name:"Arial", size:12, color:{argb:'FF666666'}}, text: "卷面成绩低于70分自动加入建议补考名单"}
  ]};
  r1s2.getCell(1).alignment = {vertical:V, horizontal:"center", wrapText:true};

  const hRow2 = ws2.addRow(["姓名", "建议补考科目", "班级", "卷面分数"]);
  hRow2.height = 35;
  hRow2.eachCell(c => { c.font = {...FONT, bold:true, size:12}; c.alignment = {vertical:V, horizontal:"center"}; c.fill = BLUE_FILL; c.border = allBorder; });

  ws2.getColumn(1).width = 14;
  ws2.getColumn(2).width = 18;
  ws2.getColumn(3).width = 28;
  ws2.getColumn(4).width = 14;

  // Collect all entries grouped by student
  const byStudent = {};
  for (const subj of orderedSubjects) {
    for (const cls of Object.keys(groups[subj])) {
      for (const e of groups[subj][cls]) {
        if (!byStudent[e.name]) byStudent[e.name] = [];
        byStudent[e.name].push({subject: subj, cls: cleanClassName(cls), score: e.score});
      }
    }
  }

  // Sort students by name, within each student sort by score ascending
  const studentNames = Object.keys(byStudent).sort((a, b) => a.localeCompare(b, 'zh'));

  for (const name of studentNames) {
    const items = byStudent[name].sort((a, b) => a.score - b.score);
    const groupStart = ws2.rowCount + 1;
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      const rowData = ["", it.subject, it.cls, it.score];
      const r = ws2.addRow(rowData);
      r.height = 25;
      r.eachCell(c => { c.font = FONT; c.alignment = {vertical:V, horizontal:"center"}; });
      r.getCell(4).font = RED_FONT_M;
    }
    const groupEnd = ws2.rowCount;
    if (groupEnd > groupStart) {
      ws2.mergeCells(groupStart, 1, groupEnd, 1);
    }
    const nameCell = ws2.getRow(groupStart).getCell(1);
    nameCell.value = name;
    nameCell.font = {...FONT, bold:true};
    nameCell.alignment = {vertical:V, horizontal:"center"};
  }

  // Full grid borders for sheet 2
  const lastDataRow2 = ws2.rowCount;
  for (let r = 2; r <= lastDataRow2; r++) {
    const row = ws2.getRow(r);
    for (let c = 1; c <= 4; c++) {
      row.getCell(c).border = allBorder;
    }
  }

  // Merge title row
  ws2.mergeCells(1, 1, 1, 4);

  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:"application/octet-stream"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = examLabel + "补考学生名单.xlsx";
  a.click();
  URL.revokeObjectURL(a.href);
}

async function dlHomework(students) {
  const FONT = {name:"Arial", size:10};
  const V = "middle";
  const YELLOW_FILL = {type:'pattern',pattern:'solid',fgColor:{argb:'FFFFF9E0'}};
  const RED_FILL = {type:'pattern',pattern:'solid',fgColor:{argb:'FFFFC9C7'}};
  const allBorder = {top:{style:"thin"},bottom:{style:"thin"},left:{style:"thin"},right:{style:"thin"}};

  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet("问题作业");
  ws.views = [{showGridLines: false}];

  // Title
  const title = (students[0]?.className || "") + " 班级问题作业清单";
  const r1 = ws.addRow([""]);
  ws.mergeCells(1, 1, 1, 6);
  r1.height = 60;
  r1.getCell(1).value = {richText: [
    {font: {name:"Arial", size:20, bold:true}, text: title + "\n"},
    {font: {name:"Arial", size:12, color:{argb:'FF666666'}}, text: "作业分数低于50自动列为问题作业"}
  ]};
  r1.getCell(1).alignment = {vertical:V, horizontal:"center", wrapText:true};

  // Header
  const hr = ws.addRow(["序号","姓名","科目","任课老师","作业名称","得分"]);
  hr.height = 24;
  hr.eachCell(c => {
    c.font = {...FONT, bold:true};
    c.alignment = {vertical:V, horizontal:"center"};
    c.fill = YELLOW_FILL;
    c.border = allBorder;
  });

  // Collect all problem homework, sorted by problem count descending
  const hwStudents = students.filter(s => s.hwProblems && s.hwProblems.length > 0)
    .sort((a, b) => b.hwProblems.length - a.hwProblems.length);
  let seq = 0;
  for (const s of hwStudents) {
    seq++;
    // Sort by course so same courses are adjacent
    const sorted = [...s.hwProblems].sort((a, b) => a.displayName < b.displayName ? -1 : a.displayName > b.displayName ? 1 : 0);
    const startRow = ws.rowCount + 1;
    for (let i = 0; i < sorted.length; i++) {
      const hw = sorted[i];
      const row = ws.addRow([
        i === 0 ? seq : "",
        i === 0 ? s.cnName : "",
        hw.displayName,
        hw.teacher,
        hw.hwName,
        hw.score
      ]);
      row.height = 24;
      row.eachCell((c, ci) => {
        c.font = FONT;
        c.alignment = {vertical:V, horizontal:"center"};
        c.border = allBorder;
      });
      row.getCell(6).fill = RED_FILL;
      row.getCell(6).font = {...FONT, color:{argb:"FFCC0000"}};
    }
    const endRow = ws.rowCount;
    // Merge 序号 and 姓名
    if (sorted.length > 1) {
      ws.mergeCells(startRow, 1, endRow, 1);
      ws.mergeCells(startRow, 2, endRow, 2);
    }
    // Merge 科目 and 任课老师 columns for consecutive same-course rows
    let cStart = startRow;
    for (let r = startRow + 1; r <= endRow + 1; r++) {
      const prev = r <= endRow ? ws.getCell(r, 3).value : null;
      const cur = ws.getCell(cStart, 3).value;
      if (r <= endRow && prev === cur) continue;
      if (r - 1 > cStart) {
        ws.mergeCells(cStart, 3, r - 1, 3);
        ws.mergeCells(cStart, 4, r - 1, 4);
      }
      cStart = r;
    }
  }

  // Column widths
  ws.getColumn(1).width = 6.5;
  ws.getColumn(2).width = 12;
  ws.getColumn(3).width = 14;
  ws.getColumn(4).width = 12;
  ws.getColumn(5).width = 45;
  ws.getColumn(6).width = 8;

  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:"application/octet-stream"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "班级问题作业清单.xlsx";
  a.click();
  URL.revokeObjectURL(a.href);
}

  const byStudent = {};
  let totalEntries = 0;
  for (const subj of orderedSubjects) {
    for (const cls of Object.keys(groups[subj])) {
      for (const e of groups[subj][cls]) {
        if (!byStudent[e.name]) byStudent[e.name] = [];
        byStudent[e.name].push({subject: subj, cls: cleanClassName(cls), score: e.score});
        totalEntries++;
      }
    }
  }
  const studentCount = Object.keys(byStudent).length;

  // Stats
  h += `<div style="display:flex;gap:16px;margin-bottom:20px">`;
  h += `<div class="stat-card" style="flex:1;padding:16px 20px"><div style="font-size:11px;color:#8f9faa;margin-bottom:4px">涉及学生</div><div style="font-size:24px;font-weight:700;color:#b8504a">${studentCount}</div></div>`;
  h += `<div class="stat-card" style="flex:1;padding:16px 20px"><div style="font-size:11px;color:#8f9faa;margin-bottom:4px">补考科次</div><div style="font-size:24px;font-weight:700;color:#b8504a">${totalEntries}</div></div>`;
  h += `<div class="stat-card" style="flex:1;padding:16px 20px"><div style="font-size:11px;color:#8f9faa;margin-bottom:4px">涉及科目</div><div style="font-size:24px;font-weight:700;color:#b8504a">${orderedSubjects.length}</div></div>`;
  h += `</div>`;

  // Tab switcher
  h += `<div style="display:flex;gap:8px;margin-bottom:16px">`;
  h += `<button class="btn" id="mkTab1" style="font-weight:600;background:#e3ecf2" onclick="document.getElementById('mkView1').style.display='';document.getElementById('mkView2').style.display='none';this.style.background='#e3ecf2';document.getElementById('mkTab2').style.background=''">按科目</button>`;
  h += `<button class="btn" id="mkTab2" onclick="document.getElementById('mkView2').style.display='';document.getElementById('mkView1').style.display='none';this.style.background='#e3ecf2';document.getElementById('mkTab1').style.background=''">按学生</button>`;
  h += `</div>`;

  // View 1: by subject
  h += `<div id="mkView1"><div class="preview-table-wrap"><table class="preview-table">`;
  h += `<thead><tr><th style="width:100px">科目</th><th style="width:180px">班级</th><th>建议补考学生</th></tr></thead><tbody>`;

  for (const subj of orderedSubjects) {
    const classes = Object.keys(groups[subj]).sort();
    let firstSubj = true;
    let totalRows = classes.length;
    for (const cls of classes) {
      const entries = groups[subj][cls].sort((a,b) => a.score - b.score);
      const names = entries.map(e => `<span style="display:inline-block;margin:2px 4px;padding:2px 8px;background:#fdf4f3;border-radius:4px;font-size:12px">${e.name} <span style="color:#c4554d;font-size:11px">${e.score}</span></span>`).join('');
      h += `<tr>`;
      if (firstSubj) {
        h += `<td rowspan="${totalRows}" style="font-weight:600;vertical-align:top;padding-top:12px">${subj}</td>`;
      }
      h += `<td style="text-align:left;padding-left:14px;font-size:12px;color:#666">${cleanClassName(cls)}</td>`;
      h += `<td style="text-align:left;padding-left:10px;line-height:2">${names}</td>`;
      h += `</tr>`;
      firstSubj = false;
    }
  }
  h += `</tbody></table></div></div>`;

  // View 2: by student
  h += `<div id="mkView2" style="display:none"><div class="preview-table-wrap"><table class="preview-table">`;
  h += `<thead><tr><th style="width:80px">姓名</th><th>建议补考科目</th><th style="width:180px">班级</th><th style="width:70px">卷面分数</th></tr></thead><tbody>`;

  const studentNames = Object.keys(byStudent).sort((a,b) => a.localeCompare(b,'zh'));
  for (const name of studentNames) {
    const items = byStudent[name].sort((a,b) => a.score - b.score);
    let first = true;
    for (const it of items) {
      h += `<tr${first ? ' class="student-first"' : ''}>`;
      if (first) {
        h += `<td class="cell-name" rowspan="${items.length}">${name}</td>`;
      }
      h += `<td style="font-size:12px">${it.subject}</td>`;
      h += `<td style="font-size:12px;color:#666">${it.cls}</td>`;
      h += `<td class="cell-red" style="font-weight:500;background:#fdf4f3">${it.score}</td>`;
      h += `</tr>`;
      first = false;
    }
  }
  h += `</tbody></table></div></div>`;

  res.innerHTML = h;
  window.scrollTo({top: document.querySelector('.wrap').offsetTop, behavior: 'smooth'});
  document.querySelector('.wrap').classList.remove('preview-mode');
}

function previewHomework(students) {
  history.pushState({view:'preview'}, '');
  const res = document.getElementById("results");
  const hwStudents = students.filter(s => s.hwProblems && s.hwProblems.length > 0)
    .sort((a, b) => b.hwProblems.length - a.hwProblems.length);

  let classShort = "";
  const cn = students[0]?.className || "";
  const cnM = cn.match(/（(.+?)）/);
  if (cnM) classShort = cnM[1] + "班";
  else { const gm = cn.match(/(\d+)年级(\d+)班/); if (gm) classShort = gm[1]+"年级"+gm[2]+"班"; }

  let h = `<div class="preview-bar">`;
  h += `<div class="preview-title">${classShort} 问题作业清单</div>`;
  h += `<div class="preview-actions">`;
  h += `<button class="btn-back" onclick="render(outputData.students, outputData.mainCols, outputData.extraCols)">← 返回</button>`;
  h += `<button class="btn-dl" onclick="dlHomework(outputData.students)">下载 Excel</button>`;
  h += `</div></div>`;

  if (hwStudents.length === 0) {
    h += `<div style="text-align:center;padding:60px 0;color:#8f9faa;font-size:14px">没有发现问题作业（得分 ≤ 50）</div>`;
    res.innerHTML = h;
    return;
  }

  const totalProblems = hwStudents.reduce((sum, s) => sum + s.hwProblems.length, 0);
  h += `<div style="display:flex;gap:16px;margin-bottom:20px">`;
  h += `<div class="stat-card" style="flex:1;padding:16px 20px"><div style="font-size:11px;color:#8f9faa;margin-bottom:4px">涉及学生</div><div style="font-size:24px;font-weight:700;color:#cb8a2e">${hwStudents.length}</div></div>`;
  h += `<div class="stat-card" style="flex:1;padding:16px 20px"><div style="font-size:11px;color:#8f9faa;margin-bottom:4px">问题作业总数</div><div style="font-size:24px;font-weight:700;color:#c4554d">${totalProblems}</div></div>`;
  h += `</div>`;

  h += `<div class="preview-table-wrap"><table class="preview-table">`;
  h += `<thead><tr><th class="sticky-col sticky-seq" style="width:40px">#</th><th class="sticky-col sticky-name" style="min-width:70px;text-align:left;padding-left:14px">姓名</th><th>科目</th><th>任课老师</th><th style="min-width:180px">作业名称</th><th style="width:60px">得分</th></tr></thead><tbody>`;

  let seq = 0;
  for (const s of hwStudents) {
    seq++;
    const sorted = [...s.hwProblems].sort((a, b) => a.displayName < b.displayName ? -1 : a.displayName > b.displayName ? 1 : 0);

    // Group by course for rowspan
    const courseGroups = [];
    let curGroup = null;
    for (const hw of sorted) {
      if (!curGroup || curGroup.name !== hw.displayName) {
        curGroup = {name: hw.displayName, teacher: hw.teacher, items: []};
        courseGroups.push(curGroup);
      }
      curGroup.items.push(hw);
    }

    let firstRow = true;
    for (const group of courseGroups) {
      let firstInGroup = true;
      for (const hw of group.items) {
        const borderTop = firstRow ? 'border-top:2px solid #d6dee8;' : '';
        h += `<tr style="${borderTop}">`;
        if (firstRow) {
          h += `<td class="cell-seq sticky-col sticky-seq" rowspan="${sorted.length}">${seq}</td>`;
          h += `<td class="cell-name sticky-col sticky-name" rowspan="${sorted.length}">${s.cnName}</td>`;
        }
        if (firstInGroup) {
          h += `<td rowspan="${group.items.length}" style="font-size:11.5px;border-left:1px solid #e8ecf0">${group.name}</td>`;
          h += `<td rowspan="${group.items.length}" style="font-size:11.5px;color:#8f9faa">${group.teacher}</td>`;
        }
        h += `<td style="text-align:left;padding-left:14px;font-size:11.5px">${hw.hwName}</td>`;
        h += `<td class="cell-red" style="font-weight:500;background:#fdf4f3">${hw.score}</td>`;
        h += `</tr>`;
        firstRow = false;
        firstInGroup = false;
      }
    }
  }

  h += `</tbody></table></div>`;

  res.innerHTML = h;
  window.scrollTo({top: document.querySelector('.wrap').offsetTop, behavior: 'smooth'});
  document.querySelector('.wrap').classList.remove('preview-mode');
}

function previewIndiv(students, mainCols, extraCols, cfgKey, withGPA, noSem) {
  history.pushState({view:'preview'}, '');
  const res = document.getElementById("results");
  const cfgs = {
    test: {
      title: "月考成绩条",
      cardSub: "月考成绩",
      scoreHeaders: noSem ? ["月考"] : ["月考","综合成绩"],
      getScores: noSem ? (c => [c.testScore]) : (c => [c.testScore, c.semScore]),
      getExtraScores: noSem ? (c => [c.testScore]) : (c => [c.testScore, c.semScore]),
      getAvgs: noSem ? ((s,mc) => [calcAvg(s,mc,c=>c.testScore)]) : ((s,mc) => [calcAvg(s,mc,c=>c.testScore), calcAvg(s,mc,c=>c.semScore)]),
      lightCol: null, highlightCol: 0,
      getTrend: null,
      sortFn: (s,mc) => calcAvg(s,mc,c=>c.testScore),
      dlFn: "dlExcelIndiv",
    },
    mid: {
      title: "月考/期中成绩条",
      cardSub: "月考/期中成绩对比",
      scoreHeaders: noSem ? ["月考","期中"] : ["月考","期中","综合成绩"],
      getScores: noSem ? (c => [c.testScore, c.midScore]) : (c => [c.testScore, c.midScore, c.semScore]),
      getExtraScores: noSem ? (c => [c.testScore, c.midScore]) : (c => [c.testScore, c.midScore, c.semScore]),
      getAvgs: noSem ? ((s,mc) => [calcAvg(s,mc,c=>c.testScore), calcAvg(s,mc,c=>c.midScore)]) : ((s,mc) => [calcAvg(s,mc,c=>c.testScore), calcAvg(s,mc,c=>c.midScore), calcAvg(s,mc,c=>c.semScore)]),
      lightCol: 0, highlightCol: 1,
      getTrend: (s,mc) => { const m=calcAvg(s,mc,c=>c.midScore),t=calcAvg(s,mc,c=>c.testScore); return(m!==null&&t!==null)?Math.round((m-t)*10)/10:null; },
      sortFn: (s,mc) => calcAvg(s,mc,c=>c.midScore),
      dlFn: "dlCompareIndiv",
    },
    final: {
      title: "期中/期末成绩条",
      cardSub: "期中/期末成绩对比",
      scoreHeaders: noSem ? ["期中","期末"] : ["期中","期末","综合成绩"],
      getScores: noSem ? (c => [c.midScore, c.finalScore]) : (c => [c.midScore, c.finalScore, c.semScore]),
      getExtraScores: noSem ? (c => [c.midScore, c.finalScore]) : (c => [c.midScore, c.finalScore, c.semScore]),
      getAvgs: noSem ? ((s,mc) => [calcAvg(s,mc,c=>c.midScore), calcAvg(s,mc,c=>c.finalScore)]) : ((s,mc) => [calcAvg(s,mc,c=>c.midScore), calcAvg(s,mc,c=>c.finalScore), calcAvg(s,mc,c=>c.semScore)]),
      lightCol: 0, highlightCol: 1,
      getTrend: (s,mc) => { const f=calcAvg(s,mc,c=>c.finalScore),m=calcAvg(s,mc,c=>c.midScore); return(f!==null&&m!==null)?Math.round((f-m)*10)/10:null; },
      sortFn: (s,mc) => calcAvg(s,mc,c=>c.finalScore),
      dlFn: "dlMidFinalIndiv",
    },
  };
  const cfg = cfgs[cfgKey];

  const sorted = [...students].sort((a,b) => {
    const aa = cfg.sortFn(a, mainCols);
    const bb = cfg.sortFn(b, mainCols);
    return (bb ?? -Infinity) - (aa ?? -Infinity);
  });

  let classShort = "";
  const cn = students[0]?.className || "";
  const cnM = cn.match(/（(.+?)）/);
  if (cnM) classShort = cnM[1] + "班";
  else { const gm = cn.match(/(\d+)年级(\d+)班/); if (gm) classShort = gm[1]+"年级"+gm[2]+"班"; }

  let h = `<div class="preview-bar">`;
  h += `<div class="preview-title">${classShort} ${cfg.title}${noSem ? '（不含综合成绩）' : ''}</div>`;
  h += `<div class="preview-actions">`;
  h += `<button class="btn-back" onclick="render(outputData.students, outputData.mainCols, outputData.extraCols)">← 返回</button>`;
  h += `<button class="btn-dl" onclick="${cfg.dlFn}(outputData.students, outputData.mainCols, outputData.extraCols, ${!!withGPA}, ${!!noSem})">下载 Excel</button>`;
  h += `</div></div>`;

  h += `<div class="cards-grid">`;

  for (let si = 0; si < sorted.length; si++) {
    const s = sorted[si];
    const stuMainCols = mainCols.filter(col => {
      const c = s.courses[col];
      if (!c) return false;
      const scores = cfg.getScores(c);
      return scores.some(v => v !== null && v !== undefined);
    });
    const stuExtraCols = extraCols.filter(col => {
      const c = s.courses[col];
      if (!c) return false;
      const scores = cfg.getExtraScores(c);
      return scores.some(v => v !== null && v !== undefined);
    });

    h += `<div class="score-card">`;
    h += `<div class="score-card-header">`;
    h += `<div class="score-card-name">${s.cnName}</div>`;
    h += `<div class="score-card-sub">${cfg.cardSub}</div>`;
    h += `</div>`;

    h += `<div class="score-card-body"><table class="score-card-table">`;
    h += `<thead><tr><th>科目</th>`;
    for (const hdr of cfg.scoreHeaders) h += `<th>${hdr}</th>`;
    h += `</tr></thead><tbody>`;

    for (const col of stuMainCols) {
      const course = s.courses[col];
      const scores = course ? cfg.getScores(course) : [];
      h += `<tr>`;
      h += `<td>${col}</td>`;
      for (let j = 0; j < cfg.scoreHeaders.length; j++) {
        const v = scores[j];
        const isNum = typeof v === 'number';
        let cls = '';
        if (cfg.lightCol !== null && j === cfg.lightCol) cls = ' class="sc-light"';
        if (isNum && v < 70 && j === cfg.highlightCol) cls = ' class="sc-red"';
        if (!isNum && course) {
          if (j === cfg.highlightCol) {
            h += `<td class="sc-orange"></td>`;
          } else if (cfg.lightCol !== null && j === cfg.lightCol) {
            h += `<td style="color:#bbb;font-size:11px">缺考</td>`;
          } else {
            h += `<td></td>`;
          }
        } else {
          h += `<td${cls}>${isNum ? v : ''}</td>`;
        }
      }
      h += `</tr>`;
    }

    // 均分 row
    const avgs = cfg.getAvgs(s, stuMainCols);
    h += `<tr class="sc-avg"><td>均分</td>`;
    for (let j = 0; j < cfg.scoreHeaders.length; j++) {
      const lightCls = (cfg.lightCol !== null && j === cfg.lightCol) ? ' style="color:#8FAABE"' : '';
      h += `<td${lightCls}>${avgs[j] !== null && avgs[j] !== undefined ? avgs[j].toFixed(1) : ''}</td>`;
    }
    h += `</tr>`;

    // 音体美
    if (stuExtraCols.length > 0) {
      h += `<tr class="sc-extra-hdr"><td colspan="${cfg.scoreHeaders.length + 1}">音体美</td></tr>`;
      for (const col of stuExtraCols) {
        const course = s.courses[col];
        const scores = course ? cfg.getExtraScores(course) : [];
        h += `<tr class="sc-extra"><td>${col}</td>`;
        for (let j = 0; j < cfg.scoreHeaders.length; j++) {
          const v = scores[j];
          h += `<td>${typeof v === 'number' ? v : ''}</td>`;
        }
        h += `</tr>`;
      }
    }

    h += `</tbody></table></div>`;

    // Footer: trend + GPA
    const trend = cfg.getTrend ? cfg.getTrend(s, stuMainCols) : null;
    const gpa = withGPA ? calcStudentGPA(s) : null;
    if (trend !== null || gpa !== null) {
      h += `<div class="score-card-footer">`;
      if (trend !== null) {
        const tColor = trend >= 0 ? '#3e7a60' : '#c4554d';
        const tBg = trend >= 0 ? '#f0f8f2' : '#fdf4f3';
        h += `<span class="score-card-trend" style="color:${tColor};background:${tBg};padding:3px 10px;border-radius:6px">均分趋势 ${trend >= 0 ? '+' : ''}${trend.toFixed(1)}</span>`;
      }
      if (gpa !== null) {
        h += `<span class="score-card-gpa">GPA ${gpa.toFixed(2)}</span>`;
      }
      h += `</div>`;
    }

    h += `</div>`; // end score-card
  }

  h += `</div>`; // end cards-grid

  res.innerHTML = h;
  window.scrollTo({top: document.querySelector('.wrap').offsetTop, behavior: 'smooth'});
  document.querySelector('.wrap').classList.add('preview-mode');
}

  h += `</div>`; // end dashboard

  h += `<div class="info">识别到的科目：${allCols.join("、")}</div>`;
  res.innerHTML = h;
  document.querySelector('.wrap').classList.remove('preview-mode');
}

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("over"); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener("change", e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  document.getElementById("errBox").style.display = "none";
  document.getElementById("warnBox").style.display = "none";
  document.getElementById("results").innerHTML = "";
  document.getElementById("dropText").textContent = `已选择：${file.name}`;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const students = parseFile(new Uint8Array(e.target.result));
      if (!students.length) {
        document.getElementById("errBox").textContent = "未找到学生成绩数据。";
        document.getElementById("errBox").style.display = "block";
        return;
      }
      outputData = buildOutput(students);
      render(outputData.students, outputData.mainCols, outputData.extraCols);
    } catch(err) {
      document.getElementById("errBox").textContent = `处理出错：${err.message}`;
      document.getElementById("errBox").style.display = "block";
    }
  };
  reader.readAsArrayBuffer(file);
}

window.addEventListener('popstate', function() {
  if (outputData) {
    render(outputData.students, outputData.mainCols, outputData.extraCols);
  }
});
</script>
